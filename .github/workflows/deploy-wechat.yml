name: Deploy to WeChat Cloud Hosting

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        default: ""

env:
  SERVICE_NAME: mortgage-agent
  CONTAINER_PORT: 8000

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image tag
        id: prep
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA}"; fi
          IMAGE="${{ secrets.TCR_SERVER }}/${{ secrets.TCR_NAMESPACE }}/${{ env.SERVICE_NAME }}:${TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_SERVER }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image }}
            ${{ secrets.TCR_SERVER }}/${{ secrets.TCR_NAMESPACE }}/${{ env.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render cloudbaserc for deployment
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
          IMAGE_URL: ${{ steps.prep.outputs.image }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          ROOT_PATH: ${{ secrets.ROOT_PATH || '' }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
          RATE_LIMIT_DEFAULT: ${{ secrets.RATE_LIMIT_DEFAULT || '60/minute' }}
          RATE_LIMIT_EXPORT: ${{ secrets.RATE_LIMIT_EXPORT || '15/minute' }}
          UVICORN_WORKERS: ${{ secrets.UVICORN_WORKERS || '2' }}
        run: |
          export ROOT_PATH="${ROOT_PATH:-}"
          export LOG_LEVEL="${LOG_LEVEL:-info}"
          export RATE_LIMIT_DEFAULT="${RATE_LIMIT_DEFAULT:-60/minute}"
          export RATE_LIMIT_EXPORT="${RATE_LIMIT_EXPORT:-15/minute}"
          export UVICORN_WORKERS="${UVICORN_WORKERS:-2}"
          envsubst < cloudbaserc.json > cloudbaserc.rendered.json
          echo "Rendered cloudbaserc.json:" && cat cloudbaserc.rendered.json

      - name: Deploy to WeChat Cloud Hosting (TCB)
        uses: TencentCloudBase/cloudbase-action@v2
        with:
          secretId: ${{ secrets.TCB_SECRET_ID }}
          secretKey: ${{ secrets.TCB_SECRET_KEY }}
          envId: ${{ secrets.TCB_ENV_ID }}
          region: ${{ secrets.TCB_REGION }}
          projectPath: .
          configFile: cloudbaserc.rendered.json

